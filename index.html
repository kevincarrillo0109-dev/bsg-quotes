// ─── Scope Pages ─────────────────────────────────────────
function PoolScopePage({cats,q}){
  const sections=[];
  if(cats.has("plaster"))sections.push(...PLASTER_SCOPE);
  if(cats.has("tile"))sections.push(...TILE_SCOPE);
  if(cats.has("coping"))sections.push(...COPING_SCOPE);
  if(sections.length>0)sections.push(...FINAL_SCOPE);
  if(sections.length===0)return null;
  return(
    <div style={{background:"#fff",padding:"48px 56px",position:"relative",fontFamily:"Georgia,serif",color:"#222",maxWidth:820,margin:"0 auto"}}>
      <Watermark/>
      <div style={{position:"relative",zIndex:1}}>
        <div style={{textAlign:"center",marginBottom:20}}><Logo size={80}/></div>
        <h1 style={{textAlign:"center",fontSize:24,fontWeight:700,marginBottom:8,fontFamily:"Georgia,serif"}}>Backyard Solutions Group</h1>
        <h2 style={{textAlign:"center",fontSize:18,fontWeight:400,marginBottom:28,color:"#555"}}>Scope of Work</h2>
        {q.client&&<div style={{marginBottom:16,fontSize:13}}><strong>Client:</strong> {q.client}{q.address?` — ${q.address}`:""}</div>}
        {sections.map((s,i)=>(
          <div key={i} style={{marginBottom:22}}>
            <h3 style={{fontSize:14,fontWeight:700,marginBottom:8,borderBottom:"1px solid #ddd",paddingBottom:4}}>{s.title}</h3>
            <ul style={{paddingLeft:20}}>{s.items.map((it,j)=><li key={j} style={{fontSize:13,marginBottom:5,lineHeight:1.6}}>{it}</li>)}</ul>
          </div>
        ))}
        <div style={{marginTop:36,borderTop:"1px solid #ddd",paddingTop:20}}>
          <div style={{fontSize:13,marginBottom:12}}>Client Signature: ___________________________</div>
          <div style={{fontSize:13}}>Date: _______________</div>
        </div>
      </div>
    </div>
  );
}

// ─── Print / Customer View ───────────────────────────────
function PrintView({q,onBack}){
  const cats=getCats(q.items);
  const hasPool=cats.has("plaster")||cats.has("tile")||cats.has("coping");
  const hasTrampoline=cats.has("trampoline");
  const showPool=hasPool&&!(q.editScope&&q.customScope);
  const showTrampoline=hasTrampoline&&!(q.editScope&&q.customScope);
  const hasScope=showPool||showTrampoline||(q.editScope&&q.customScope);
  const[scopeOpen,setScopeOpen]=React.useState(false);

  return(
    <div>
      <style>{`@media print{.no-print{display:none!important}.page-break{page-break-before:always}}`}</style>
      <div style={{background:"#fff",minHeight:"100vh",fontFamily:"Georgia,serif",color:"#222",padding:"32px 20px",position:"relative",maxWidth:520,margin:"0 auto"}}>
        <Watermark/>
        <div style={{position:"relative",zIndex:1}}>
          {/* Header */}
          <div style={{background:"#4a5c3a",margin:"-32px -20px 0",padding:"24px 20px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <img src={LOGO_DATA} style={{width:64,height:64,borderRadius:"50%",objectFit:"cover",flexShrink:0}}/>
              <div style={{lineHeight:1.55}}>
                <div style={{fontWeight:700,fontSize:15,color:"#fff"}}>Backyard Solutions Group</div>
                <div style={{fontSize:12,color:"#c8d8b8"}}>(469) 972-5757</div>
                <div style={{fontSize:12,color:"#c8d8b8"}}>contact@backyardsolutionsgroup.com</div>
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontWeight:700,fontSize:15,color:"#fff"}}>{fmtDate(q.date)}</div>
            </div>
          </div>
          <div style={{height:4,background:"#c96a2b",margin:"0 -20px 20px"}}></div>
          {q.deposit&&Number(q.deposit)>0&&(
            <div style={{marginBottom:14,padding:"10px 14px",background:"#f5f8f0",border:"1px solid #4a5c3a44",borderRadius:6,fontSize:13,fontWeight:600}}>
              A deposit of {fmt(q.deposit)} will be required to begin.
            </div>
          )}
          {q.client&&(
            <div style={{borderLeft:"3px solid #c96a2b",paddingLeft:12,marginBottom:16}}>
              <div style={{fontSize:10,color:"#9ca3af",fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>Estimate For</div>
              <div style={{fontWeight:700,fontSize:18,color:"#222",marginBottom:4}}>{q.client}</div>
              {q.address&&<div style={{fontSize:13,color:"#6b7280"}}>{q.address}</div>}
            </div>
          )}
          {/* Line Items Cards */}
          <div style={{marginBottom:20}}>
            {q.items.map((item)=>{
              const qty=Number(item.qty)||0;
              const unit=Number(item.unit)||0;
              const amt=qty*unit;
              const cat=PRODUCTS[item.productKey]?PRODUCTS[item.productKey].category:"other";
              const isTrampoline=cat==="trampoline";
              return(
                <div key={item.id} style={{borderRadius:10,overflow:"hidden",marginBottom:12,boxShadow:"0 1px 6px rgba(0,0,0,0.08)"}}>
                  <div style={{background:"#4a5c3a",padding:"11px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{color:"#fff",fontWeight:700,fontSize:14}}>{item.itemName||"—"}</span>
                    <span style={{color:"#fff",fontWeight:700,fontSize:14,whiteSpace:"nowrap",marginLeft:12}}>{fmt(amt)}</span>
                  </div>
                  <div style={{background:"#fff",padding:"12px 16px",border:"1px solid #e5e7eb",borderTop:"none",borderBottomLeftRadius:10,borderBottomRightRadius:10}}>
                    {item.desc&&<p style={{color:"#6b7280",fontSize:12,lineHeight:1.65,marginBottom:10,whiteSpace:"pre-line"}}>{item.desc}</p>}
                    <div style={{display:"flex",gap:20}}>
                      <span style={{fontSize:12,color:"#555"}}><strong>Qty:</strong> {isTrampoline?qty:`${qty} unit${qty!==1?"s":""}`}</span>
                      <span style={{fontSize:12,color:"#555"}}><strong>Unit price:</strong> {fmt(unit)}</span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          {/* Totals */}
          <div style={{display:"flex",justifyContent:"flex-end",marginBottom:24}}>
            <table className="totals-table" style={{fontSize:13,borderCollapse:"collapse",minWidth:260}}>
              <tbody>
                <tr><td style={{padding:"4px 16px",color:"#555"}}>Subtotal</td><td style={{padding:"4px 16px",textAlign:"right"}}>{fmt(sub(q))}</td></tr>
                {Number(q.discount)>0&&<tr><td style={{padding:"4px 16px",color:"#555"}}>Discount ({q.discount}%)</td><td style={{padding:"4px 16px",textAlign:"right",color:"#c96a2b"}}>-{fmt(dsc(q))}</td></tr>}
                <tr><td style={{padding:"4px 16px",color:"#555"}}>Sales Tax:</td><td style={{padding:"4px 16px",textAlign:"right"}}>{fmt(tx(q))}</td></tr>
                <tr style={{background:"#f0f3ec"}}><td style={{padding:"8px 16px",fontWeight:700,fontSize:15}}>Total Amount:</td><td style={{padding:"8px 16px",fontWeight:700,fontSize:15,textAlign:"right",color:"#c96a2b"}}>{fmt(tot(q))}</td></tr>
              </tbody>
            </table>
          </div>
          {q.notes&&<div style={{fontSize:12,color:"#555",borderTop:"1px solid #eee",paddingTop:12,marginBottom:16}}>{q.notes}</div>}
          {/* Acorn Financing */}
          {q.offer_financing!==false&&(
            <div style={{border:"2px solid #4a5c3a",borderRadius:10,padding:"14px 18px",marginBottom:20}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <div style={{background:"#4a5c3a",borderRadius:"50%",width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{color:"#fff",fontWeight:700,fontSize:12}}>A</span></div>
                <span style={{fontWeight:700,fontSize:14,color:"#4a5c3a"}}>Acorn Finance</span>
              </div>
              <div style={{fontWeight:700,fontSize:13,color:"#4a5c3a",marginBottom:4}}>Pay for your project over time</div>
              <div style={{fontSize:12,color:"#6b7280",marginBottom:12}}>✓ Checking your rate won't impact your credit score</div>
              <a href={ACORN_URL} target="_blank" rel="noopener noreferrer" style={{display:"inline-block",background:"#4a5c3a",color:"#fff",textDecoration:"none",borderRadius:6,padding:"9px 18px",fontSize:13,fontWeight:600}}>Check My Rate →</a>
            </div>
          )}
          {/* Collapsible Scope of Work */}
          {hasScope&&(
            <div className="no-print" style={{marginBottom:20,borderTop:"1px solid #e5e7eb",paddingTop:16}}>
              <button onClick={()=>setScopeOpen(o=>!o)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:8,color:"#4a5c3a",fontSize:13,fontWeight:700,padding:0,width:"100%",textAlign:"left"}}>
                <span style={{fontSize:10,transition:"transform 0.2s",display:"inline-block",transform:scopeOpen?"rotate(90deg)":"rotate(0deg)"}}>▶</span>
                <span>View Scope of Work</span>
              </button>
              {scopeOpen&&(
                <div style={{marginTop:14,fontSize:12,color:"#444",lineHeight:1.7}}>
                  {q.editScope&&q.customScope
                    ?<div style={{whiteSpace:"pre-line"}}>{q.customScope}</div>
                    :<div>
                      {(()=>{
                        const sections=[];
                        if(cats.has("plaster"))sections.push(...PLASTER_SCOPE);
                        if(cats.has("tile"))sections.push(...TILE_SCOPE);
                        if(cats.has("coping"))sections.push(...COPING_SCOPE);
                        if(sections.length>0)sections.push(...FINAL_SCOPE);
                        return sections.map((s,i)=>(
                          <div key={i} style={{marginBottom:14}}>
                            <div style={{fontWeight:700,fontSize:12,color:"#4a5c3a",marginBottom:6,borderBottom:"1px solid #e5e7eb",paddingBottom:4}}>{s.title}</div>
                            <ul style={{paddingLeft:18}}>{s.items.map((it,j)=><li key={j} style={{marginBottom:4}}>{it}</li>)}</ul>
                          </div>
                        ));
                      })()}
                      {hasTrampoline&&(
                        <div style={{marginTop:8,padding:"10px 12px",background:"#f9fafb",borderRadius:6,border:"1px solid #e5e7eb",fontSize:11,color:"#555"}}>
                          InGround Trampoline Installation Agreement is attached to the printed document.
                        </div>
                      )}
                    </div>
                  }
                </div>
              )}
            </div>
          )}
          <div className="no-print" style={{display:"flex",gap:12,justifyContent:"center",marginTop:16}}>
            <button onClick={()=>window.print()} style={{background:"#c96a2b",color:"#fff",border:"none",borderRadius:8,padding:"12px 32px",fontSize:14,fontWeight:700,cursor:"pointer"}}>Print / Save as PDF</button>
            {onBack&&<button onClick={onBack} style={{background:"#374151",color:"#fff",border:"none",borderRadius:8,padding:"12px 32px",fontSize:14,cursor:"pointer"}}>← Back</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

function ClientView({qid}){
  const[q,setQ]=React.useState(null);
  const[loading,setLoading]=React.useState(true);
  React.useEffect(()=>{dbGetOne(qid).then(data=>{setQ(data);setLoading(false);});},[]);
  if(loading)return<div style={{display:"flex",justifyContent:"center",alignItems:"center",height:"100vh",background:"#fff",fontFamily:"Georgia,serif",fontSize:16}}>Loading your quote...</div>;
  if(!q)return<div style={{display:"flex",justifyContent:"center",alignItems:"center",height:"100vh",background:"#fff"}}>Quote not found.</div>;
  return<PrintView q={q}/>;
}

// ─── Editor ──────────────────────────────────────────────
function Editor({quote,onSave,onCancel,onDelete,saveStatus}){
  const[q,setQ]=React.useState(quote);
  const set=(k,v)=>setQ(p=>({...p,[k]:v}));

  const handleProduct=(id,productKey)=>{
    const prod=PRODUCTS[productKey]||PRODUCTS["Add-On Service"];
    setQ(p=>({...p,items:p.items.map(i=>i.id===id?{...i,productKey,itemName:prod.itemName,desc:prod.desc}:i)}));
  };
  const setItem=(id,k,v)=>setQ(p=>({...p,items:p.items.map(i=>i.id===id?{...i,[k]:v}:i)}));
  const addItem=()=>setQ(p=>({...p,items:[...p.items,eItem()]}));
  const removeItem=id=>setQ(p=>({...p,items:p.items.filter(i=>i.id!==id)}));

  const cats=getCats(q.items);
  const hasPool=cats.has("plaster")||cats.has("tile")||cats.has("coping");
  const hasTrampoline=cats.has("trampoline");
  const hasScopeService=hasPool||hasTrampoline;
  const s=sub(q),d=dsc(q),t=tx(q),total_=tot(q);

  return(
    <div style={{minHeight:"100vh",background:BG,color:"#e5e7eb",fontFamily:"Georgia,serif",padding:"24px 16px"}}>
      <div style={{maxWidth:700,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
          <div>
            <div style={{fontSize:18,fontWeight:700,color:"#e5e7eb"}}>{q.quoteNumber}</div>
            <div style={{fontSize:12,color:"#8a9a7a",letterSpacing:1}}>BACKYARD SOLUTIONS GROUP</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {saveStatus&&<span style={{fontSize:12,color:OLIVE_LIGHT}}>{saveStatus}</span>}
            <button onClick={onCancel} style={btn("#374151")}>Cancel</button>
            <button onClick={()=>onSave(q)} style={btn(OLIVE)}>Save</button>
          </div>
        </div>
        {/* Client Info */}
        <div style={{background:CARD,borderRadius:10,padding:16,marginBottom:14,borderLeft:`3px solid ${OLIVE}`}}>
          <div style={secTitle}>Client Info</div>
          <div style={{display:"flex",gap:12,marginBottom:10}}>
            <div style={{flex:1}}><label style={lbl}>Client Name</label><input value={q.client} onChange={e=>set("client",e.target.value)} placeholder="John Smith" style={inp}/></div>
            <div style={{flex:1}}><label style={lbl}>Date</label><input type="date" value={q.date} onChange={e=>set("date",e.target.value)} style={inp}/></div>
          </div>
          <div style={{display:"flex",gap:12}}>
            <div style={{flex:1}}><label style={lbl}>Address</label><input value={q.address} onChange={e=>set("address",e.target.value)} placeholder="123 Main St, Cedar Hill TX" style={inp}/></div>
            <div style={{flex:1}}><label style={lbl}>Deposit Required ($)</label><input type="number" value={q.deposit||""} onChange={e=>set("deposit",e.target.value)} placeholder="e.g. 2000" style={inp} min={0}/></div>
          </div>
        </div>
        {/* Line Items */}
        <div style={{background:CARD,borderRadius:10,padding:16,marginBottom:14,borderLeft:`3px solid ${OLIVE}`}}>
          <div style={secTitle}>Line Items</div>
          {q.items.map((item,idx)=>{
            const cat=PRODUCTS[item.productKey]?PRODUCTS[item.productKey].category:"other";
            const isTrampoline=cat==="trampoline";
            const isAddon=item.productKey==="Add-On Service";
            return(
              <div key={item.id} style={{background:BG,borderRadius:8,padding:12,marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{fontSize:12,color:"#8a9a7a",fontWeight:600}}>Item {idx+1}</div>
                  <button onClick={()=>removeItem(item.id)} style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
                </div>
                <div style={{marginBottom:8}}>
                  <label style={lbl}>Product / Service</label>
                  <select value={item.productKey||"Add-On Service"} onChange={e=>handleProduct(item.id,e.target.value)} style={inp}>
                    {PRODUCT_GROUPS.map(g=>(
                      <optgroup key={g.label} label={g.label}>
                        {g.options.map(o=><option key={o} value={o}>{o}</option>)}
                      </optgroup>
                    ))}
                  </select>
                </div>
                <div style={{marginBottom:8}}>
                  <label style={lbl}>Item Name (on quote)</label>
                  <input value={item.itemName||""} onChange={e=>setItem(item.id,"itemName",e.target.value)} placeholder={isAddon?"Enter service name...":"e.g. Pool Interior"} style={inp}/>
                </div>
                <div style={{display:"flex",gap:8,marginBottom:8}}>
                  <div style={{flex:1}}>
                    <label style={lbl}>{isTrampoline?"Quantity":"Qty"}</label>
                    <input type="number" value={item.qty} onChange={e=>setItem(item.id,"qty",e.target.value)} style={inp} min={0}/>
                  </div>
                  <div style={{flex:1}}>
                    <label style={lbl}>Unit Price ($)</label>
                    <input type="number" value={item.unit} onChange={e=>setItem(item.id,"unit",e.target.value)} style={inp} min={0} step="0.01"/>
                  </div>
                  <div style={{flex:1,display:"flex",alignItems:"flex-end",paddingBottom:2}}>
                    <div style={{fontSize:14,color:ORANGE_LIGHT,fontWeight:700}}>{fmt((Number(item.qty)||0)*(Number(item.unit)||0))}</div>
                  </div>
                </div>
                <div>
                  <label style={lbl}>Description</label>
                  <textarea value={item.desc||""} onChange={e=>setItem(item.id,"desc",e.target.value)} style={{...inp,height:90,resize:"vertical"}}/>
                </div>
              </div>
            );
          })}
          <button onClick={addItem} style={{background:"#ffffff0d",border:`1px dashed ${OLIVE}`,color:"#8a9a7a",borderRadius:6,padding:"6px 14px",cursor:"pointer",fontSize:12}}>+ Add Item</button>
        </div>
        {/* Scope section */}
        {hasScopeService&&(
          <div style={{background:CARD,borderRadius:10,padding:16,marginBottom:14,borderLeft:`3px solid ${OLIVE}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={secTitle}>Scope of Work</div>
              <label style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"#9ca3af",cursor:"pointer"}}>
                <input type="checkbox" checked={!!q.editScope} onChange={e=>set("editScope",e.target.checked)}/>
                Customize
              </label>
            </div>
            {q.editScope
              ?<textarea value={q.customScope||""} onChange={e=>set("customScope",e.target.value)} placeholder="Type your custom scope or notes here..." style={{...inp,height:160,resize:"vertical"}}/>
              :<div style={{fontSize:12,color:"#6b7280",lineHeight:1.6}}>
                {[hasPool?"Pool remodeling scope of work will auto-attach (Resurfacing → Tile → Coping + Final Inspection).":null,
                  hasTrampoline?"InGround Trampoline Installation Agreement will auto-attach.":null]
                  .filter(Boolean).join(" ")}
              </div>
            }
          </div>
        )}
        {/* Totals */}
        <div style={{background:CARD,borderRadius:10,padding:16,marginBottom:14,borderLeft:`3px solid ${OLIVE}`}}>
          <div style={secTitle}>Totals</div>
          <div style={{display:"flex",gap:12,marginBottom:10}}>
            <div style={{flex:1}}><label style={lbl}>Discount (%)</label><input type="number" value={q.discount} onChange={e=>set("discount",e.target.value)} style={inp} min={0} max={100}/></div>
            <div style={{flex:1,display:"flex",alignItems:"flex-end",paddingBottom:2}}><label style={{...lbl,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}><input type="checkbox" checked={q.taxEnabled} onChange={e=>set("taxEnabled",e.target.checked)}/>Apply Tax (8.25%)</label></div>
          </div>
          <div style={{background:BG,borderRadius:8,padding:"14px 16px",display:"flex",flexDirection:"column",gap:6}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#e5e7eb"}}><span>Subtotal</span><span>{fmt(s)}</span></div>
            {Number(q.discount)>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:ORANGE}}><span>Discount ({q.discount}%)</span><span>-{fmt(d)}</span></div>}
            {q.taxEnabled&&<div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#e5e7eb"}}><span>Tax (8.25%)</span><span>{fmt(t)}</span></div>}
            <div style={{borderTop:`1px solid #3a4832`,marginTop:4,paddingTop:8,display:"flex",justifyContent:"space-between",fontSize:16,fontWeight:700,color:ORANGE_LIGHT}}><span>Total</span><span>{fmt(total_)}</span></div>
          </div>
        </div>
        {/* Notes */}
        <div style={{background:CARD,borderRadius:10,padding:16,marginBottom:14,borderLeft:`3px solid ${OLIVE}`}}>
          <div style={secTitle}>Notes</div>
          <textarea value={q.notes||""} onChange={e=>set("notes",e.target.value)} placeholder="Payment terms, special instructions..." style={{...inp,height:80,resize:"vertical"}}/>
        </div>
        {/* Financing toggle */}
        <div style={{background:CARD,borderRadius:10,padding:16,marginBottom:14,borderLeft:`3px solid ${OLIVE}`}}>
          <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",fontSize:13,color:"#e5e7eb"}}>
            <input type="checkbox" checked={q.offer_financing!==false} onChange={e=>set("offer_financing",e.target.checked)}/>
            Offer Acorn financing to client
          </label>
        </div>
        {/* Status + Delete */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <label style={lbl}>Status</label>
            <select value={q.status} onChange={e=>set("status",e.target.value)} style={{...inp,width:"auto",color:SC[q.status],fontWeight:600}}>{STATUSES.map(s=><option key={s} value={s}>{s}</option>)}</select>
          </div>
          <button onClick={()=>{if(window.confirm("Delete this quote?"))onDelete(q.id);}} style={{background:"none",border:"1px solid #c05a3a44",color:"#c05a3a",borderRadius:6,padding:"6px 14px",cursor:"pointer",fontSize:12}}>Delete</button>
        </div>
      </div>
    </div>
  );
}

// ─── Dashboard / App ─────────────────────────────────────
function App(){
  const[quotes,setQuotes]=React.useState([]);
  const[loading,setLoading]=React.useState(true);
  const[view,setView]=React.useState("dashboard");
  const[current,setCurrent]=React.useState(null);
  const[filter,setFilter]=React.useState("All");
  const[shareLink,setShareLink]=React.useState(null);
  const[saveStatus,setSaveStatus]=React.useState("");

  // Check for client-facing view via ?q= param
  const urlParams=new URLSearchParams(window.location.search);
  const qParam=urlParams.get("q");
  if(qParam){return<ClientView qid={qParam}/>;}

  // Legacy hash support
  const hash=window.location.hash.replace("#","");
  if(hash.startsWith("quote/")){return<ClientView qid={hash.replace("quote/","")}/>;}

  React.useEffect(()=>{dbGetAll().then(rows=>{setQuotes(rows.map(r=>JSON.parse(r.data)));setLoading(false);});},[]);

  const saveQuote=async(q)=>{setSaveStatus("Saving...");const ok=await dbUpsert(q);if(ok){setQuotes(p=>p.find(x=>x.id===q.id)?p.map(x=>x.id===q.id?q:x):[q,...p]);setSaveStatus("Saved ✓");setTimeout(()=>setSaveStatus(""),2000);setView("dashboard");}else{setSaveStatus("Error — check connection");}};
  const deleteQuote=async(id)=>{await dbDelete(id);setQuotes(p=>p.filter(x=>x.id!==id));setView("dashboard");};
  const updateStatus=async(id,status)=>{const u=quotes.map(x=>x.id===id?{...x,status}:x);setQuotes(u);await dbUpsert(u.find(x=>x.id===id));};
  const getLink=q=>`${APP_URL}/?q=${q.id}`;

  const filtered=filter==="All"?quotes:quotes.filter(q=>q.status===filter);
  const totalOwed=quotes.filter(q=>!["Paid in Full","Draft"].includes(q.status)).reduce((s,q)=>s+tot(q),0);
  const totalCollected=quotes.filter(q=>q.status==="Paid in Full").reduce((s,q)=>s+tot(q),0);
  const totalDeposit=quotes.filter(q=>q.status==="Deposit Paid").reduce((s,q)=>s+tot(q),0);

  if(view==="editor")return<Editor quote={current} onSave={saveQuote} onCancel={()=>setView("dashboard")} onDelete={deleteQuote} saveStatus={saveStatus}/>;
  if(view==="preview")return<PrintView q={current} onBack={()=>setView("dashboard")}/>;

  return(
    <div style={{minHeight:"100vh",background:BG,color:"#e5e7eb",fontFamily:"Georgia,serif",padding:"24px 16px"}}>
      <div style={{maxWidth:960,margin:"0 auto"}}>
        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:28}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <img src={LOGO_DATA} style={{width:52,height:52,objectFit:"contain"}}/>
            <div>
              <div style={{fontSize:18,fontWeight:700,color:"#e5e7eb",letterSpacing:0.5}}>Backyard Solutions Group</div>
              <div style={{fontSize:11,color:"#8a9a7a",letterSpacing:2,textTransform:"uppercase"}}>Quote Management</div>
            </div>
          </div>
          <button onClick={()=>{setCurrent(eQuote());setView("editor");}} style={{...btn(ORANGE),letterSpacing:0.5}}>+ New Quote</button>
        </div>
        {/* Summary Cards */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:24}}>
          {[{label:"Outstanding",value:fmt(totalOwed),color:"#c05a3a"},{label:"Deposit Paid",value:fmt(totalDeposit),color:"#d4a843"},{label:"Collected",value:fmt(totalCollected),color:OLIVE_LIGHT}].map(c=>(
            <div key={c.label} style={{background:CARD,borderRadius:10,padding:"16px 18px",borderLeft:`3px solid ${c.color}`}}>
              <div style={{fontSize:11,color:"#6b7280",marginBottom:4,letterSpacing:1,textTransform:"uppercase"}}>{c.label}</div>
              <div style={{fontSize:20,fontWeight:700,color:c.color}}>{c.value}</div>
            </div>
          ))}
        </div>
        {/* Filter Buttons */}
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          {["All",...STATUSES].map(s=><button key={s} onClick={()=>setFilter(s)} style={{padding:"5px 12px",borderRadius:20,fontSize:12,border:"none",cursor:"pointer",background:filter===s?(SC[s]||OLIVE):"#24281e",color:filter===s?"#fff":"#9ca3af",fontWeight:filter===s?600:400}}>{s}</button>)}
        </div>
        {/* Share Modal */}
        {shareLink&&(
          <div style={{position:"fixed",inset:0,background:"#000000aa",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setShareLink(null)}>
            <div style={{background:CARD,borderRadius:12,padding:28,maxWidth:480,width:"90%"}} onClick={e=>e.stopPropagation()}>
              <div style={{fontWeight:700,fontSize:15,marginBottom:8,color:"#fff"}}>Share Quote with Client</div>
              <div style={{fontSize:12,color:"#9ca3af",marginBottom:12}}>Text or email this link. Client opens it on any device.</div>
              <div style={{background:BG,borderRadius:8,padding:"10px 14px",fontSize:12,color:ORANGE_LIGHT,wordBreak:"break-all",marginBottom:14}}>{shareLink}</div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>navigator.clipboard.writeText(shareLink)} style={btn("#3b82f6")}>Copy Link</button>
                <button onClick={()=>setShareLink(null)} style={btn("#374151")}>Close</button>
              </div>
            </div>
          </div>
        )}
        {/* Quote List */}
        {loading?(
          <div style={{textAlign:"center",color:"#4b5563",padding:"60px 0",fontSize:14}}>Loading quotes...</div>
        ):filtered.length===0?(
          <div style={{textAlign:"center",color:"#4b5563",padding:"60px 0",fontSize:14}}>No quotes yet. Hit + New Quote to start.</div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {filtered.map(q=>(
              <div key={q.id} style={{background:CARD,borderRadius:10,padding:"14px 16px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",borderLeft:`2px solid ${SC[q.status]||"#374151"}`}}>
                <div style={{flex:1,minWidth:160}}>
                  <div style={{fontWeight:600,fontSize:14,color:"#fff"}}>{q.client||"No Client"}</div>
                  <div style={{fontSize:11,color:"#6b7280"}}>{q.quoteNumber} · {q.date}</div>
                </div>
                <div style={{fontSize:15,fontWeight:700,color:ORANGE_LIGHT,minWidth:90,textAlign:"right"}}>{fmt(tot(q))}</div>
                <select value={q.status} onChange={e=>updateStatus(q.id,e.target.value)} style={{background:SC[q.status]+"22",color:SC[q.status],border:`1px solid ${SC[q.status]}44`,borderRadius:6,padding:"4px 8px",fontSize:12,cursor:"pointer",fontWeight:600}}>{STATUSES.map(s=><option key={s} value={s}>{s}</option>)}</select>
                <button onClick={()=>{setCurrent(q);setView("preview");}} style={{background:"#ffffff0d",border:"none",color:"#9ca3af",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12}}>Preview</button>
                <button onClick={()=>setShareLink(getLink(q))} style={{background:OLIVE+"22",border:`1px solid ${OLIVE}44`,color:OLIVE_LIGHT,borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12}}>Share</button>
                <button onClick={()=>{setCurrent(q);setView("editor");}} style={{background:"#ffffff0d",border:"none",color:"#9ca3af",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12}}>Edit</button>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
